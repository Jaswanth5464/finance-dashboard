# ── Server ────────────────────────────────────────────────────────────────────
# Render sets the PORT env var; default to 8080 locally
server.port=${PORT:8080}

# ── Database (Aiven MySQL) ────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?ssl-mode=REQUIRED&useSSL=true&requireSSL=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning (Render free tier has limited threads)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=86400000

# ── App ───────────────────────────────────────────────────────────────────────
spring.application.name=finance-dashboard

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
spring.mvc.pathmatch.use-suffix-pattern=false
springdoc.swagger-ui.disable-swagger-default-url=true

# ── Actuator (health check for Render) ────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never