# ── App ───────────────────────────────────────────────────────────────────────
spring.application.name=finance-dashboard

# ── Database (local dev) ──────────────────────────────────────────────────────
# For production (Render + Aiven), use SPRING_PROFILES_ACTIVE=prod
# which loads application-prod.properties instead
spring.datasource.url=jdbc:mysql://localhost:3306/finance_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:your_local_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=finance-dashboard-super-secret-key-2024-very-long-string
app.jwt.expiration=86400000

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
spring.mvc.pathmatch.use-suffix-pattern=false
springdoc.swagger-ui.disable-swagger-default-url=true